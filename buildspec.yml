version: 0.2

phases:

  # The image needs to be created locally, fetching it from anywhere is too much of a hassle

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR"
      - aws --version
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH}
      - echo "FROM aws/codebuild/amazonlinux2-x86_64-standard:4.0" > Dockerfile.base
      - docker build -t base:local -f Dockerfile.base .

  build:
    commands:
      - echo "Building docker image"
      - echo "FROM base:local" > Dockerfile.new
      - cat Dockerfile >> Dockerfile.new
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG -f Dockerfile.new

  post_build:
    commands:
      - echo "Pushing docker image"
      - aws ecr get-login-password | docker login --username AWS --password-stdin $REPOSITORY_URI
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Writing image definitions file..."
      - printf '[{"name":"ecs-test", "imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
  - imagedefinitions.json
  - '**/*'
  discard-paths: yes
  base-directory: '.'

