version: 0.2

phases:

  install:
    commands:
      - echo "Starting deployment script"
      - python -m ensurepip --upgrade
      - echo "Installing pip..."
      - python -m pip install --upgrade pip
      - echo "Installing requirements..."
      - python -m pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR"
      - aws --version
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 730335357068.dkr.ecr.eu-central-1.amazonaws.com
      - REPOSITORY_URI=730335357068.dkr.ecr.eu-central-1.amazonaws.com/cicdtests/devopsimages
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo "Build started on `date`"
      - echo "Building docker image"
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Build completed on `date`"
      - echo "Pushing docker image"
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Writing image definitions file..."
      - printf '[{"name":"ecs-test", "imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
  - imagedefinitions.json
  - '**/*'
  discard-paths: yes
  base-directory: '.'

